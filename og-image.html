<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OG Image – ElderBridge</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px;
    font-family: 'Inter', -apple-system, sans-serif;
    background: #FDF8F2;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .bg-shape-1 {
    position: absolute; top: -120px; right: -80px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(155,77,192,0.25) 0%, transparent 70%);
    border-radius: 50%;
  }
  .bg-shape-2 {
    position: absolute; bottom: -100px; left: -60px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(232,184,48,0.20) 0%, transparent 70%);
    border-radius: 50%;
  }
  .bg-shape-3 {
    position: absolute; top: 40px; left: 50%;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(107,45,139,0.06) 0%, transparent 70%);
    border-radius: 50%;
    transform: translateX(-50%);
  }
  .card {
    position: relative; z-index: 1;
    width: 1080px; height: 510px;
    background: #FFFFFF;
    border-radius: 32px;
    box-shadow: 0 24px 80px rgba(42,21,10,0.15);
    display: flex; flex-direction: column;
    padding: 56px 64px;
    justify-content: space-between;
    border: 1px solid rgba(232,184,48,0.15);
    overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px;
    background: linear-gradient(90deg, #6B2D8B, #E8B830, #6B2D8B);
  }
  .top {
    display: flex; align-items: center; gap: 12px;
  }
  .top i {
    font-size: 32px; color: #9B4DC0;
  }
  .top span {
    font-size: 22px; font-weight: 800; color: #2A150A;
    letter-spacing: -0.02em;
  }
  .middle {
    display: flex; flex-direction: column; gap: 8px;
  }
  .middle h1 {
    font-size: 58px; font-weight: 900; color: #2A150A;
    letter-spacing: -0.04em; line-height: 1.1;
  }
  .middle h1 em {
    font-style: normal;
    background: linear-gradient(135deg, #6B2D8B, #9B4DC0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .middle p {
    font-size: 24px; font-weight: 500; color: #5A4030;
    line-height: 1.4; max-width: 75%;
  }
  .badge-row {
    display: flex; gap: 16px;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 20px;
    border-radius: 9999px;
    font-weight: 600; font-size: 16px;
  }
  .badge-purple {
    background: linear-gradient(135deg, #6B2D8B, #9B4DC0);
    color: #FFFFFF;
  }
  .badge-yellow {
    background: #FFF3CC;
    color: #6B3A1F;
    border: 1px solid #FFE8A0;
  }
  .bottom {
    display: flex; justify-content: space-between; align-items: flex-end;
  }
  .bottom .tagline {
    font-size: 16px; color: #8A7A6E; font-weight: 500;
  }
  .bottom .tagline i {
    color: #E8B830; margin-right: 6px;
  }
  .bottom .url {
    font-size: 16px; font-weight: 600; color: #6B2D8B;
    letter-spacing: 0.02em;
  }
  .accent-line {
    position: absolute; right: 0; top: 120px;
    width: 8px; height: 200px;
    background: linear-gradient(180deg, #E8B830, #9B4DC0);
    border-radius: 4px 0 0 4px;
  }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <div class="bg-shape-1"></div>
  <div class="bg-shape-2"></div>
  <div class="bg-shape-3"></div>
  <div class="card">
    <div class="accent-line"></div>
    <div class="top">
      <i class="fas fa-hand-holding-heart"></i>
      <span>ElderBridge</span>
    </div>
    <div class="middle">
      <h1>Zwei Generationen.<br>Ein <em>Austausch</em>.</h1>
      <p>Jung bringt Digitales bei – Alt gibt Lebenserfahrung weiter.<br>Kostenloses generationsübergreifendes Mentoring.</p>
    </div>
    <div class="badge-row">
      <span class="badge badge-purple"><i class="fas fa-star" aria-hidden="true"></i> 100 % kostenlos</span>
      <span class="badge badge-yellow"><i class="fas fa-hands-helping" aria-hidden="true"></i> Barrierefrei</span>
    </div>
    <div class="bottom">
      <span class="tagline"><i class="fas fa-heart" aria-hidden="true"></i> Brücken zwischen Generationen bauen</span>
      <span class="url">elderbridge.app</span>
    </div>
  </div>
</body>
</html>
